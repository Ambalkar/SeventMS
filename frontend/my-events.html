<!DOCTYPE html>
<html>
<head>
    <title>My Bookings - SEVENT-MS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background:
                linear-gradient(180deg, rgba(7, 8, 10, 0.10), #07080a 82%),
                linear-gradient(115deg, rgba(45, 212, 191, 0.10), transparent 34%),
                linear-gradient(245deg, rgba(251, 191, 36, 0.09), transparent 36%),
                #07080a;
        }

        .container {
            max-width: 900px;
            padding: 6.25rem 1.5rem 3rem;
            margin: 0 auto;
        }

        .search-shell {
            background: linear-gradient(145deg, rgba(20, 23, 28, 0.98), rgba(7, 8, 10, 0.96));
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .search-shell h1 {
            margin: 0 0 0.5rem;
            font-size: 1.8rem;
            color: var(--color-text-primary);
        }

        .search-shell p {
            color: var(--color-text-secondary);
            margin: 0 0 1.5rem;
        }

        .search-form {
            display: flex;
            gap: 0.75rem;
        }

        .search-form input {
            flex: 1;
            padding: 0.75rem;
            border-radius: var(--radius);
            font-size: 1rem;
        }

        .search-form button {
            min-height: 48px;
            padding: 0.75rem 1.5rem;
        }

        .bookings-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .booking-card {
            background: linear-gradient(145deg, rgba(20, 23, 28, 0.98), rgba(7, 8, 10, 0.96));
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .booking-card::before {
            content: '';
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
            background: linear-gradient(to bottom, var(--color-accent-teal), var(--color-accent-gold));
        }

        .booking-header {
            display: flex;
            justify-between;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 0.75rem;
        }

        .booking-header h2 {
            margin: 0;
            font-size: 1.3rem;
            color: var(--color-text-primary);
        }

        .booking-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.65rem;
            border-radius: var(--radius);
            border: 1px solid rgba(251, 191, 36, 0.28);
            color: var(--color-accent-gold);
            background: rgba(251, 191, 36, 0.08);
            font-size: 0.75rem;
            font-weight: 700;
        }

        .booking-type-badge.sub {
            border-color: rgba(45, 212, 191, 0.28);
            color: var(--color-accent-teal);
            background: rgba(45, 212, 191, 0.08);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .meta-item i {
            color: var(--color-accent-teal);
            width: 16px;
        }

        .digital-id-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--color-border);
            border-radius: var(--radius);
            padding: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .digital-id-box strong {
            color: var(--color-accent-teal);
            font-family: monospace;
            font-size: 1.05rem;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: var(--color-accent-teal);
        }

        @media (max-width: 600px) {
            .search-form {
                flex-direction: column;
            }
            .booking-header {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-calendar-alt"></i> SeventMS
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="events.html" class="nav-link">
                    <i class="fas fa-calendar-alt"></i> Browse Events
                </a>
                <a href="my-events.html" class="nav-link active">
                    <i class="fas fa-ticket-alt"></i> My Events
                </a>
                <a href="login.html" class="nav-link">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="search-shell">
            <h1>My Bookings</h1>
            <p>Retrieve bookings and your digital check-in passes using your email address.</p>
            <form id="searchForm" class="search-form">
                <input type="email" id="emailInput" placeholder="Enter your registered email address" required autocomplete="email">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search"></i> Search
                </button>
            </form>
        </main>

        <section id="resultsSection" class="bookings-list">
            <!-- Results rendered here -->
        </section>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const searchForm = document.getElementById('searchForm');
        const emailInput = document.getElementById('emailInput');
        const resultsSection = document.getElementById('resultsSection');

        async function fetchBookings(email) {
            resultsSection.innerHTML = `
                <div style="text-align: center; padding: 2rem; color: var(--color-text-secondary);">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--color-accent-teal); margin-bottom: 0.5rem;"></i>
                    <p>Fetching bookings...</p>
                </div>
            `;

            try {
                const res = await fetch(CONFIG.API_BASE_URL + `/api/my-events?email=${encodeURIComponent(email)}`);
                const bookings = await res.json();
                renderBookings(bookings);
            } catch (err) {
                console.error(err);
                resultsSection.innerHTML = `
                    <div class="alert error" style="text-align: center; padding: 2rem;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p style="margin-top:0.5rem;">Could not load bookings. Make sure the backend is reachable.</p>
                    </div>
                `;
            }
        }

        function renderBookings(bookings) {
            if (bookings.length === 0) {
                resultsSection.innerHTML = `
                    <div style="text-align: center; padding: 3rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius);">
                        <i class="fas fa-receipt fa-2x" style="opacity: 0.3; margin-bottom: 1rem;"></i>
                        <h3>No bookings found</h3>
                        <p style="color: var(--color-text-secondary);">We couldn't find any event bookings linked to this email.</p>
                    </div>
                `;
                return;
            }

            resultsSection.innerHTML = bookings.map(booking => {
                const isMajor = booking.bookingType === 'MAJOR_EVENT';
                const badgeText = isMajor ? 'Major Event Pass' : 'Sub Event Booking';
                const badgeClass = isMajor ? 'booking-type-badge' : 'booking-type-badge sub';
                const event = booking.event;

                return `
                    <div class="booking-card">
                        <div class="booking-header">
                            <div>
                                <span class="${badgeClass}">${badgeText}</span>
                                <h2 style="margin-top:0.5rem;">${event.name}</h2>
                            </div>
                            <div style="font-size: 0.85rem; color: var(--color-text-secondary); text-align: right;">
                                Registered to: <strong style="color: var(--color-text-primary);">${booking.name}</strong>
                            </div>
                        </div>

                        <div class="meta-grid">
                            <div class="meta-item">
                                <i class="far fa-calendar-alt"></i>
                                <span>Date: ${event.date}</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>Location: ${event.location}</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-info-circle"></i>
                                <span>${event.eventType === 'MAJOR' ? 'Includes sub-events' : 'Single event pass'}</span>
                            </div>
                        </div>

                        <div class="digital-id-box">
                            <div>
                                <div style="font-size:0.75rem; color: var(--color-text-secondary); margin-bottom:0.25rem;">DIGITAL CHECK-IN ID</div>
                                <strong id="id-${booking.digitalId}">${booking.digitalId}</strong>
                            </div>
                            <button class="copy-btn" onclick="copyId('${booking.digitalId}')" title="Copy check-in ID">
                                <i class="far fa-copy fa-lg"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyId(id) {
            navigator.clipboard.writeText(id).then(() => {
                alert('Digital check-in ID copied to clipboard!');
            }).catch(err => {
                console.error('Copy failed', err);
            });
        }

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (email) {
                fetchBookings(email);
            }
        });

        // If user is already logged in, prefill and search
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (user.authenticated) {
                emailInput.value = user.email;
                fetchBookings(user.email);
            }
        });
    </script>
</body>
</html>
